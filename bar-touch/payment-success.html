<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago Exitoso - Club Condesa</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #000000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .success-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .logo {
            width: 200px;
            margin-bottom: 30px;
        }

        .success-icon {
            font-size: 80px;
            color: #27ae60;
            margin-bottom: 20px;
            animation: checkmark 0.8s ease-in-out;
        }

        @keyframes checkmark {
            0% { transform: scale(0) rotate(45deg); }
            50% { transform: scale(1.2) rotate(-5deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 28px;
        }

        .order-number {
            font-size: 36px;
            color: #d4af37;
            font-weight: 700;
            margin: 20px 0;
        }

        .message {
            color: #7f8c8d;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .details {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            text-align: left;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .detail-row:last-child {
            border-bottom: none;
            font-weight: 700;
            font-size: 18px;
        }

        .detail-label {
            color: #7f8c8d;
        }

        .detail-value {
            color: #2c3e50;
            font-weight: 600;
        }

        .button-group {
            display: flex;
            gap: 15px;
        }

        .btn {
            flex: 1;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #d4af37;
            color: black;
        }

        .btn-secondary {
            background: #ecf0f1;
            color: #2c3e50;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .receipt-info {
            background: #fff9e6;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #d4af37;
            margin-bottom: 20px;
        }

        .dinelco-logo {
            height: 30px;
            margin-top: 20px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="success-container">
        <img src="logo-condesa.jpg" alt="Club Condesa" class="logo">
        
        <div class="success-icon">✓</div>
        
        <h1>¡Pago Exitoso!</h1>
        
        <div class="order-number" id="orderNumber">Orden #0000</div>
        
        <p class="message">
            Tu pago ha sido procesado exitosamente.<br>
            El bartender está preparando tu pedido.
        </p>

        <div class="receipt-info">
            <strong>💳 Recibo enviado a tu email</strong><br>
            <small>Conserva el número de orden para retirar tu pedido</small>
        </div>

        <div class="details">
            <div class="detail-row">
                <span class="detail-label">Método de pago</span>
                <span class="detail-value">Dinelco ****<span id="lastDigits">0000</span></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Código de autorización</span>
                <span class="detail-value" id="authCode">000000</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Fecha y hora</span>
                <span class="detail-value" id="timestamp">--</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Total pagado</span>
                <span class="detail-value" style="color: #d4af37" id="totalAmount">₲ 0</span>
            </div>
        </div>

        <div class="button-group">
            <button class="btn btn-secondary" onclick="window.print()">
                Imprimir Recibo
            </button>
            <button class="btn btn-primary" onclick="window.location.href='index.html'">
                Nueva Orden
            </button>
        </div>

        <img src="https://www.dinelco.com.py/images/logo.png" alt="Dinelco" class="dinelco-logo">
    </div>

    <script>
        // Obtener parámetros de la URL
        const params = new URLSearchParams(window.location.search);
        const orderNum = params.get('order') || localStorage.getItem('lastOrder') || '0001';
        const total = params.get('amount') || localStorage.getItem('lastAmount') || '0';
        const auth = params.get('auth') || Math.floor(Math.random() * 1000000);
        const digits = params.get('card') || '1234';
        
        // Actualizar valores
        document.getElementById('orderNumber').textContent = `Orden #${orderNum}`;
        document.getElementById('lastDigits').textContent = digits;
        document.getElementById('authCode').textContent = auth;
        document.getElementById('timestamp').textContent = new Date().toLocaleString('es-PY');
        document.getElementById('totalAmount').textContent = `₲ ${parseInt(total).toLocaleString('es-PY')}`;

        // Auto-cerrar después de 15 segundos
        setTimeout(() => {
            window.location.href = 'index.html';
        }, 15000);
    </script>
</body>
</html>
